name: GeBiz Watch

on:
  schedule:
    - cron: '30 0 * * *'   # 08:30 SGT (UTC+8) = 00:30 UTC
  workflow_dispatch:         # allow manual run from GitHub Actions tab

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run GeBiz Watch
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python gebiz_watch.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_state.json
          git diff --cached --quiet || git commit -m "chore: update seen_state [skip ci]"
          git push
